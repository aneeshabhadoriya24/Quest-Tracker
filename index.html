<!DOCTYPE html>
<html>
<head>
    <title>Daily Quest Tracker</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="welcomeScreen" class="screen active">
        <div class="card">
            <h1>Hello Explorer! 🌼</h1>
            <p>Welcome to your Daily Quest Tracker 🌿</p>
            <button onclick="enterApp()">Enter</button>
        </div>
    </div>
    <div id="dashboard" class="screen hidden">
        <h1>Heyya! Your Dashboard 🌿</h1>

        <div class="stats">
            <h3>XP: <span id="xp">0</span></h3>
            <h3>Level: <span id="level">1</span></h3>
        </div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>
        <div class="inputBox">
            <input type="text" id="taskInput" placeholder="Add today's quest">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
